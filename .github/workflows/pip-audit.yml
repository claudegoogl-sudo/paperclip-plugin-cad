name: Dependency audit (pip-audit)

on:
  pull_request:
    paths:
      - 'worker/requirements-cad.txt'
  push:
    branches:
      - main
    paths:
      - 'worker/requirements-cad.txt'

jobs:
  pip-audit:
    name: pip-audit — worker/requirements-cad.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r worker/requirements-cad.txt
