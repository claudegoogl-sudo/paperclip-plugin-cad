name: Sandbox tests (bwrap + seccomp)

# PLA-114 acceptance: "CI runs the bwrap test suite (does not skip)."
#
# This workflow installs bubblewrap + libseccomp-dev on a Linux runner,
# builds the seccomp filter blob from worker/seccomp_filter.c, and runs
# the bwrap integration matrix + perf gates. The matrix and perf gates
# are mandatory; absence of bwrap on the runner is a hard failure here.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'worker/**'
      - 'package.json'
      - 'package-lock.json'
      - 'esbuild.config.mjs'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/sandbox.yml'
  push:
    branches:
      - main

jobs:
  sandbox:
    name: bwrap + seccomp integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (bubblewrap, libseccomp-dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap libseccomp-dev libseccomp2 build-essential pkg-config
          bwrap --version
          pkg-config --modversion libseccomp

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Install cadquery into the SYSTEM python (/usr/bin/python3). The bwrap
      # sandbox argv only mounts `/usr` (and `/lib`, `/lib64`, `/bin`,
      # `/etc/ld.so.cache`) — the actions/setup-python hostedtoolcache path
      # at /opt/hostedtoolcache/Python/... is NOT visible inside the
      # sandbox, so any cadquery installed via the GitHub-managed python
      # would be invisible to the worker. We therefore install with the
      # system interpreter and `--break-system-packages` (required by
      # PEP 668 on Ubuntu 24.04, which is acceptable for a single-purpose
      # CI runner).
      - name: Install Python worker deps (into /usr/bin/python3 site-packages)
        run: |
          /usr/bin/python3 --version
          sudo /usr/bin/python3 -m pip install --break-system-packages -r worker/requirements-cad.txt
          /usr/bin/python3 -c "import cadquery; print('host cadquery=', cadquery.__version__)"

      - name: npm install
        run: npm ci

      - name: Build seccomp filter blob
        run: |
          make -C worker seccomp_filter.bpf seccomp_filter.bpf.sha256
          test -s worker/seccomp_filter.bpf
          cat worker/seccomp_filter.bpf.sha256

      - name: Build cad_preexec wrapper (rlimit fallback)
        run: make -C worker cad_preexec

      - name: Capture clone-flag evidence on this runner (PLA-106 §2.1)
        run: |
          # PLA-106 §2.1 requires the deploy-host clone-flag capture before
          # locking the BPF mask for a release. The CI runner is a reasonable
          # proxy for the deploy host (Ubuntu 24.04). NEW14 will catch a
          # runtime mismatch.
          strace -e clone,clone3 -f python3 \
            -c "import threading; threading.Thread(target=lambda: None).start()" \
            2>&1 | tail -10 | tee clone-evidence-ci.txt

      - name: Capture clone3 ENOSYS-fallback evidence (PLA-106 §6.4)
        shell: bash
        run: |
          set -euo pipefail
          # Spec rev 3 (3ffe6af0) §6.4: before the seccomp filter blob can be
          # locked for a release, the deploy-class host must produce three
          # measurement rows demonstrating the clone3 -> ENOSYS -> clone(2)
          # fallback works under the production seccomp filter. The script
          # exits 1 on the (4,0) outcome, which fails the build per spec
          # (escalation is board-approval-class, not silent retry).
          install -d evidence
          ./worker/measure-clone-fallback.sh all | tee evidence/clone-fallback-ci.md

      - name: Upload §6.4 measurement artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pla106-section-6.4-clone-fallback-evidence
          path: |
            evidence/clone-fallback-ci.md
            clone-evidence-ci.txt
            worker/seccomp_filter.bpf.sha256
          if-no-files-found: error

      - name: Sandbox smoke — verify bwrap+seccomp can spawn python
        # Diagnostic gate: runs bwrap with the EXACT argv the production
        # spawn path uses (mirrors buildSpawnInvocation in
        # src/cad-worker-client.ts) and feeds it a no-op python program.
        # If this step fails, the bwrap test matrix below cannot succeed
        # either, and the stderr captured here is the load-bearing
        # diagnostic for the failure (the test envelope only surfaces
        # "Worker produced no output on stdout. stderr: ..." which is
        # invisible to a vanilla `toBe(true)` assertion). Keeps the CI
        # cycle short by failing here instead of after a 30-test rerun.
        shell: bash
        run: |
          set -uo pipefail
          install -d /tmp/cad-bwrap-smoke
          # Pre-flight: dump the host-side toolchain (which python, where pip
          # installed cadquery). The bwrap world only sees /usr/bin:/bin via
          # PATH, so if `pip install` landed cadquery in hostedtoolcache it is
          # invisible inside the sandbox. This printout makes that mismatch
          # impossible to miss.
          echo "host: which bwrap = $(command -v bwrap || echo MISSING)"
          bwrap --version || true
          echo "host: which python3 (PATH lookup) = $(command -v python3 || echo MISSING)"
          /usr/bin/python3 --version || true
          /usr/bin/python3 -c "import cadquery, sys; print('host /usr/bin/python3 cadquery=', cadquery.__version__)" 2>&1 || \
            echo "host /usr/bin/python3: cadquery NOT importable"
          cat > /tmp/cad-bwrap-smoke/probe.py <<'PY'
          import sys
          print("bwrap-smoke: python=", sys.version.split()[0], "exe=", sys.executable)
          try:
              import cadquery
              print("bwrap-smoke: cadquery=", cadquery.__version__)
          except Exception as e:  # noqa: BLE001
              print("bwrap-smoke: cadquery import FAILED:", repr(e))
              sys.exit(2)
          sys.exit(0)
          PY
          # Mirror the rlimits from defaultRlimits() in cad-worker-client.ts
          # (asBytes=2GiB, nproc=64, nofile=256, fsize=256MiB, cpu=t+5,
          # core=0). Mismatched values would confuse the diagnostic.
          RLIMIT_AS=2147483648
          RLIMIT_NPROC=64
          RLIMIT_NOFILE=256
          RLIMIT_FSIZE=268435456
          RLIMIT_CPU=35
          RLIMIT_CORE=0
          set +e
          exec 3<worker/seccomp_filter.bpf
          bwrap \
            --unshare-all \
            --share-net=false \
            --die-with-parent \
            --new-session \
            --clearenv \
            --setenv PATH /usr/bin:/bin \
            --setenv HOME /tmp \
            --setenv LANG C.UTF-8 \
            --setenv PYTHONDONTWRITEBYTECODE 1 \
            --setenv PYTHONHASHSEED random \
            --setenv PYTHONUNBUFFERED 1 \
            --uid 65534 --gid 65534 \
            --hostname cad-worker \
            --proc /proc \
            --dev /dev \
            --ro-bind /usr /usr \
            --ro-bind /lib /lib \
            --ro-bind /lib64 /lib64 \
            --ro-bind /bin /bin \
            --ro-bind /etc/ld.so.cache /etc/ld.so.cache \
            --tmpfs /tmp \
            --bind /tmp/cad-bwrap-smoke /tmp/cad-bwrap-smoke \
            --chdir /tmp/cad-bwrap-smoke \
            --cap-drop ALL \
            --seccomp 3 \
            --rlimit-as "$RLIMIT_AS" \
            --rlimit-nproc "$RLIMIT_NPROC" \
            --rlimit-nofile "$RLIMIT_NOFILE" \
            --rlimit-fsize "$RLIMIT_FSIZE" \
            --rlimit-cpu "$RLIMIT_CPU" \
            --rlimit-core "$RLIMIT_CORE" \
            -- python3 /tmp/cad-bwrap-smoke/probe.py
          rc=$?
          exec 3<&-
          echo "bwrap-smoke exit=$rc"
          if [[ $rc -ne 0 ]]; then
            echo "::error::bwrap+seccomp smoke spawn failed with exit $rc — see stderr above. The bwrap test matrix cannot pass while this is failing."
            exit $rc
          fi

      - name: Build TypeScript bundles
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run bwrap integration matrix
        run: npx vitest run --config ./vitest.config.ts src/sandbox.bwrap.test.ts

      - name: Run perf tests (PLA-106 §6.2 gates)
        run: npx vitest run --config ./vitest.config.ts src/sandbox.bwrap.perf.test.ts
